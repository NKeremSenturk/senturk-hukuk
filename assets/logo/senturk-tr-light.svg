<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" role="img" aria-label="Şentürk Marka ve Hukuk Bürosu">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&display=swap');
    .name { font-family:'Cormorant Garamond', Georgia, serif; font-weight:600; letter-spacing:6px; }
    .sub  { font-family:'Inter', sans-serif; font-weight:500; }
  </style>
  <rect width="560" height="320" fill="#ffffff"/>
  <!-- faint globe -->
  <g fill="none" stroke="#0b1f3a" stroke-opacity="0.10" stroke-width="1.1">
    <circle cx="280" cy="150" r="110"/>
    <ellipse cx="280" cy="150" rx="37" ry="110"/>
    <ellipse cx="280" cy="150" rx="74" ry="110"/>
    <line x1="280" y1="40" x2="280" y2="260"/>
    <ellipse cx="280" cy="150" rx="110" ry="37"/>
    <ellipse cx="280" cy="150" rx="110" ry="74"/>
    <line x1="170" y1="150" x2="390" y2="150"/>
  </g>
  <text class="name" x="280" y="174" text-anchor="middle" font-size="92" fill="#0b1f3a">ŞENTÜRK</text>
  <text class="sub" x="280" y="228" text-anchor="middle" font-size="20" letter-spacing="7" fill="#255a82">MARKA VE HUKUK BÜROSU</text>
</svg>
