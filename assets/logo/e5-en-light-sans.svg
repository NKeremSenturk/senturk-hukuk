<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 380" role="img" aria-label="Şentürk Law & IP">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500&display=swap');
    .name { font-family:'Plus Jakarta Sans', sans-serif; font-weight:700; }
    .sub  { font-family:'Inter', sans-serif; font-weight:500; }
  </style>
  <defs>
    <clipPath id="caps"><rect x="0" y="0" width="460" height="120"/><rect x="0" y="258" width="460" height="122"/></clipPath>
  </defs>
  <rect width="460" height="380" fill="#ffffff"/>
  <g clip-path="url(#caps)" fill="none" stroke="#163a63" stroke-opacity="0.7" stroke-width="1.3">
    <circle cx="230" cy="190" r="150"/>
    <ellipse cx="230" cy="190" rx="50" ry="150"/>
    <ellipse cx="230" cy="190" rx="100" ry="150"/>
    <line x1="230" y1="40" x2="230" y2="340"/>
    <ellipse cx="230" cy="190" rx="150" ry="50"/>
    <ellipse cx="230" cy="190" rx="150" ry="100"/>
  </g>
  <text class="name" x="230" y="188" text-anchor="middle" font-size="50" letter-spacing="2" fill="#0b1f3a">ŞENTÜRK</text>
  <text class="sub" x="230" y="222" text-anchor="middle" font-size="20" letter-spacing="11" fill="#255a82">LAW &amp; IP</text>
</svg>
