<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 380" role="img" aria-label="Şentürk Marka ve Hukuk Bürosu">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&display=swap');
    .name { font-family:'Cormorant Garamond', Georgia, serif; font-weight:600; }
    .sub  { font-family:'Inter', sans-serif; font-weight:500; }
  </style>
  <defs>
    <clipPath id="caps"><rect x="0" y="0" width="460" height="120"/><rect x="0" y="258" width="460" height="122"/></clipPath>
  </defs>
  <rect width="460" height="380" fill="#0b1f3a"/>
  <g clip-path="url(#caps)" fill="none" stroke="#ffffff" stroke-opacity="0.72" stroke-width="1.3">
    <circle cx="230" cy="190" r="150"/>
    <ellipse cx="230" cy="190" rx="50" ry="150"/>
    <ellipse cx="230" cy="190" rx="100" ry="150"/>
    <line x1="230" y1="40" x2="230" y2="340"/>
    <ellipse cx="230" cy="190" rx="150" ry="50"/>
    <ellipse cx="230" cy="190" rx="150" ry="100"/>
  </g>
  <text class="name" x="230" y="190" text-anchor="middle" font-size="58" letter-spacing="5" fill="#ffffff">ŞENTÜRK</text>
  <text class="sub" x="230" y="222" text-anchor="middle" font-size="15.5" letter-spacing="5" fill="#9bc1dd">MARKA VE HUKUK BÜROSU</text>
</svg>
