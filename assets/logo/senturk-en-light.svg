    .name { font-family:'Cormorant Garamond', Georgia, serif; font-weight:600; letter-spacing:6px; }
    .sub  { font-family:'Inter', sans-serif; font-weight:500; }
    .tag  { font-family:'Inter', sans-serif; font-weight:400; }
  </style>
  <rect width="560" height="320" fill="#ffffff"/>
