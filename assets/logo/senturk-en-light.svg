  <text class="sub" x="280" y="222" text-anchor="middle" font-size="29" letter-spacing="15" fill="#102a4c">LAW &amp; IP</text>
  <text class="tag" x="280" y="256" text-anchor="middle" font-size="11.5" letter-spacing="3" fill="#255a82">INTELLECTUAL PROPERTY · TRADEMARKS · COMMERCIAL LAW</text>
